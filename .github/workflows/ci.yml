name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Logic tests
        run: npm run test:logic

      # Non-blocking until the tsc-clean PR (#15) is merged. Flip to a hard
      # failure (remove continue-on-error) once main is tsc-clean.
      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true
